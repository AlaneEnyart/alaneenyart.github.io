<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sold Paintings — Alane Enyart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:  #f5f0e8;
      --ink:    #1c1a17;
      --gold:   #b8975a;
      --muted:  #8a8070;
      --dim:    rgba(28,26,23,0.45);
      --col:    3;
      --gap:    14px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .sold-header {
      padding: 60px 60px 12px;
      display: flex;
      align-items: baseline;
      gap: 2rem;
      border-bottom: 1px solid rgba(28,26,23,0.12);
      margin-bottom: 52px;
    }
    .sold-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .sold-header h1 em {
      font-style: italic;
      color: var(--gold);
    }
    .sold-count {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MASONRY GRID ── */
    #masonry {
      padding: 0 40px;
      max-width: 1400px;
      margin: 0 auto;
      columns: var(--col);
      column-gap: var(--gap);
    }

    /* ── CARD ── */
    .card {
      break-inside: avoid;
      margin-bottom: var(--gap);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease, box-shadow 0.3s ease;
    }
    .card.in-view {
      opacity: 1;
      transform: translateY(0);
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .card:hover img { transform: scale(1.04); }
    .card:hover { box-shadow: 0 14px 44px rgba(28,26,23,0.18); }

    /* Sold ribbon */
    .card::before {
      content: 'SOLD';
      position: absolute;
      top: 14px; left: -28px;
      background: var(--gold);
      color: #fff;
      font-size: 0.58rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      padding: 4px 34px;
      transform: rotate(-45deg);
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .card:hover::before { opacity: 1; }

    /* Caption overlay — title only */
    .card-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 32px 16px 14px;
      background: linear-gradient(to top, rgba(28,26,23,0.75) 0%, transparent 100%);
      transform: translateY(100%);
      transition: transform 0.38s ease;
      color: #fff;
    }
    .card:hover .card-caption { transform: translateY(0); }
    .card-caption .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.04em;
    }

    /* Skeleton shimmer */
    .card .skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #e8e2d6 25%, #ede8de 50%, #e8e2d6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .card img.loaded ~ .skeleton { display: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) { :root { --col: 3; } }
    @media (max-width: 800px)  {
      :root { --col: 2; }
      #masonry { padding: 0 16px; }
      .sold-header { padding: 36px 16px 12px; }
    }
    @media (max-width: 480px)  { :root { --col: 1; } }

    /* ── FOOTER ── */
    .sold-footer {
      text-align: center;
      padding: 48px 0 24px;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sold-footer a { color: var(--gold); text-decoration: none; }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(28,26,23,0.96);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    #lightbox.open { display: flex; }

    #lightbox-close {
      position: absolute;
      top: 22px; right: 30px;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    #lightbox-close:hover { opacity: 1; }

    #lightbox-img {
      max-width: 82vw;
      max-height: 75vh;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    #lightbox-title {
      margin-top: 22px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      color: #fff;
      text-align: center;
    }

    /* prev / next arrows */
    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      opacity: 0.4;
      cursor: pointer;
      padding: 10px 18px;
      transition: opacity 0.2s;
      line-height: 1;
    }
    .lb-arrow:hover { opacity: 1; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }
  </style>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header class="sold-header">
  <h1>Sold <em>Paintings</em></h1>
  <span class="sold-count" id="count-label"></span>
</header>

<!-- ══════════════ MASONRY ══════════════ -->
<div id="masonry"></div>

<!-- ══════════════ FOOTER ══════════════ -->
<footer class="sold-footer">
  <a href="index.html">← Return to site</a>
  &nbsp;&nbsp;·&nbsp;&nbsp;
  All works © Alane Enyart
</footer>

<!-- ══════════════ LIGHTBOX ══════════════ -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕ Close</button>
  <button class="lb-arrow" id="lb-prev" onclick="shiftLightbox(-1)">&#8249;</button>
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-title"></div>
  <button class="lb-arrow" id="lb-next" onclick="shiftLightbox(1)">&#8250;</button>
</div>

<script>
// ─────────────────────────────────────────────────────────
//  PAINTINGS LIST
// ─────────────────────────────────────────────────────────
const sold = [
  "beach_splash.jpg",
  "beach_splash2.jpg",
  "bird_of_paradise.jpg",
  "birth_of_joy.jpg",
  "carnivale.jpg",
  "chrysalis.jpg",
  "coral_and_sea.jpg",
  "gulf_break_dance.jpg",
  "gulf_romance_dance.jpg",
  "gulf_romance_dance_5.jpg",
  "heavenly_light.jpg",
  "imprint.jpg",
  "insta_3.jpg",
  "in_the_mangroves.jpg",
  "lemonchello.jpg",
  "metamorphosis.jpg",
  
  "morning_light.jpg",
  "outside_purple_leaves.jpg",
  "prisca.jpg",
  "robbins_nest.jpg",
  "seascape.jpg",
  "soaring_eagle.jpg",
  "splash.jpg",
  "sunset_on_the_wing.jpg",
  "sunset_romance_dance.jpg",
  "sunset_splash.jpg",
  "surf_sky_and_sand.jpg",
  "symphony_of_dragonfire.jpg",
  "tranquil.jpg",
  "untitled.jpg"
];

// ─────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────
function prettyTitle(filename) {
  return filename
    .replace(/\.jpg$/i, '')
    .replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}
function galleryPath(f) { return `images/gallerySOLD/${f}?v=2`; }
function clickPath(f)   { return `images/clickSOLD/${f}`; }

// ─────────────────────────────────────────────────────────
//  RENDER MASONRY
// ─────────────────────────────────────────────────────────
function renderMasonry() {
  const container = document.getElementById('masonry');
  document.getElementById('count-label').textContent = `${sold.length} works`;

  sold.forEach((filename, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.transitionDelay = `${(idx % 6) * 0.06}s`;

    const img = document.createElement('img');
    img.src     = galleryPath(filename);
    img.alt     = prettyTitle(filename);
    img.loading = 'lazy';
    img.onload  = () => img.classList.add('loaded');

    const skel = document.createElement('div');
    skel.className = 'skeleton';

    const cap = document.createElement('div');
    cap.className = 'card-caption';
    cap.innerHTML = `<div class="title">${prettyTitle(filename)}</div>`;

    card._idx = idx;
    card.addEventListener('click', () => openLightbox(idx));

    card.appendChild(img);
    card.appendChild(skel);
    card.appendChild(cap);
    container.appendChild(card);
  });

  // Staggered reveal on scroll
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in-view');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.06 });

  document.querySelectorAll('.card').forEach(el => observer.observe(el));
}

// ─────────────────────────────────────────────────────────
//  LIGHTBOX
// ─────────────────────────────────────────────────────────
let currentIdx = 0;

function openLightbox(idx) {
  currentIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const f = sold[currentIdx];
  document.getElementById('lightbox-img').src   = clickPath(f);
  document.getElementById('lightbox-img').alt   = prettyTitle(f);
  document.getElementById('lightbox-title').textContent = prettyTitle(f);
}

function shiftLightbox(dir) {
  currentIdx = (currentIdx + dir + sold.length) % sold.length;
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ─────────────────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderMasonry();

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  shiftLightbox(-1);
    if (e.key === 'ArrowRight') shiftLightbox(1);
  });
});
</script>
</body>
</html>
