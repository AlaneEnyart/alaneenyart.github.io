<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Available Paintings</title>

<style>

body{
    margin:0;
    background:#f4f1ea;
    font-family:Georgia, serif;
    color:#222;
}

h1{
    text-align:center;
    margin-top:60px;
    margin-bottom:50px;
    font-weight:300;
    letter-spacing:2px;
    font-size:2.2rem;
}

#gallery{
    width:94%;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:28px;
    padding-bottom:80px;
}

.row{
    display:flex;
    gap:24px;
    align-items:flex-end;
    justify-content:center;
}

.painting{
    position:relative;
    overflow:hidden;
    background:white;
    box-shadow:
        0 2px 8px rgba(0,0,0,0.08),
        0 8px 30px rgba(0,0,0,0.06);

    transition:
        transform .35s ease,
        box-shadow .35s ease;

    border-radius:2px;
}

.painting:hover{
    transform:translateY(-6px) scale(1.02);

    box-shadow:
        0 10px 20px rgba(0,0,0,0.12),
        0 18px 40px rgba(0,0,0,0.15);
}

.painting img{
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
}

.caption{
    position:absolute;
    bottom:0;
    left:0;
    right:0;

    background:rgba(255,255,255,0.85);

    padding:8px 12px;

    font-size:0.9rem;
    letter-spacing:0.5px;
}

@media(max-width:900px){

    .row{
        flex-wrap:wrap;
        justify-content:center;
    }

}

</style>
</head>

<body>

<h1>Available Paintings</h1>

<div id="gallery"></div>

<script>

async function loadGallery(){

    const response = await fetch('paintings.json');
    const paintings = await response.json();

    //////////////////////////////////////////////////////
    // COLOR ORDER FOR VISUAL FLOW
    //////////////////////////////////////////////////////

    const colorFlow = {
        blue: 0,
        green: 1,
        mixed: 2,
        yellow: 3,
        red: 4,
        gray: 5
    };

    //////////////////////////////////////////////////////
    // SORT FOR HARMONIC DISTRIBUTION
    //////////////////////////////////////////////////////

    paintings.sort((a,b)=>{

        // dominant structure:
        // visual weight first

        if(Math.abs(a.visualWeight - b.visualWeight) > 0.08){
            return b.visualWeight - a.visualWeight;
        }

        // then brightness

        if(Math.abs(a.brightness - b.brightness) > 0.1){
            return b.brightness - a.brightness;
        }

        // then color flow

        return colorFlow[a.dominantColor]
             - colorFlow[b.dominantColor];
    });

    //////////////////////////////////////////////////////
    // BUILD ROWS
    //////////////////////////////////////////////////////

    const rows = [];

    let currentRow = [];
    let rowWidth = 0;

    const targetRowWidth = 12;

    paintings.forEach(p=>{

        const aspect = p.width / p.height;

        const normalized =
            aspect *
            (0.8 + p.visualWeight);

        if(rowWidth + normalized > targetRowWidth){

            rows.push(currentRow);

            currentRow = [];
            rowWidth = 0;
        }

        currentRow.push(p);
        rowWidth += normalized;

    });

    if(currentRow.length){
        rows.push(currentRow);
    }

    //////////////////////////////////////////////////////
    // CREATE DOM
    //////////////////////////////////////////////////////

    const gallery = document.getElementById('gallery');

    rows.forEach((row,rowIndex)=>{

        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';

        //////////////////////////////////////////////////
        // VARY ROW HEIGHT ORGANICALLY
        //////////////////////////////////////////////////

        let baseHeight;

        if(rowIndex % 3 === 0){
            baseHeight = 320;
        }
        else if(rowIndex % 3 === 1){
            baseHeight = 260;
        }
        else{
            baseHeight = 380;
        }

        //////////////////////////////////////////////////
        // LOCAL HARMONIC SORT
        //////////////////////////////////////////////////

        row.sort((a,b)=>{

            const scoreA =
                colorFlow[a.dominantColor] * 2 +
                a.textureDensity +
                a.visualWeight;

            const scoreB =
                colorFlow[b.dominantColor] * 2 +
                b.textureDensity +
                b.visualWeight;

            return scoreA - scoreB;
        });

        //////////////////////////////////////////////////
        // CREATE PAINTINGS
        //////////////////////////////////////////////////

        row.forEach((p,index)=>{

            const div = document.createElement('div');
            div.className = 'painting';

            //////////////////////////////////////////////////
            // TRUE PROPORTIONAL SIZE
            //////////////////////////////////////////////////

            const ratio = p.width / p.height;

            let h =
                baseHeight *
                (0.8 + p.visualWeight * 0.5);

            //////////////////////////////////////////////////
            // TEXTURE AFFECTS SCALE
            //////////////////////////////////////////////////

            h *= (1 - p.textureDensity * 0.12);

            const w = h * ratio;

            div.style.width = `${w}px`;
            div.style.height = `${h}px`;

            //////////////////////////////////////////////////
            // IMAGE NAME
            //////////////////////////////////////////////////

            const cleanTitle = p.title
                  .trim()
                  .replace(/\s+/g, '_')
                  .replace(/[()]/g,'');

           const fileName =
           `${p.id}_${cleanTitle}_${p.height}_${p.width}.JPG`;

            div.innerHTML = `

                <img
                    src="./images/IMG/${fileName}"
                    loading="lazy"
                    alt="${p.title}"
                >

                <div class="caption">
                    ${p.title.replaceAll('_',' ')}
                </div>

            `;

            rowDiv.appendChild(div);

        });

        gallery.appendChild(rowDiv);

    });

}

loadGallery();

</script>

</body>
</html>
